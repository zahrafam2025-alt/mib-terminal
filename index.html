<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIB Terminal — Inside Today's Market</title>
<meta name="description" content="Step inside today's market. The Market Intelligence Brief, told as an immersive story — same brief, unforgettable presentation.">
<link rel="stylesheet" href="styles.css">
<script>
  // Tier loader (prototype affordance): ?tier=public renders the exact surface
  // production's daily preview exposes; default is the member experience.
  // Both manifests are built by concept/build.py — this page only presents.
  (function () {
    var tier = new URLSearchParams(location.search).get("tier") === "public"
      ? "public" : "member";
    document.write('<script src="data/' +
      (tier === "public" ? "brief_public.js" : "brief.js") + '"><\/script>');
  })();
</script>
</head>
<body>
  <canvas id="world" aria-hidden="true"></canvas>
  <div id="hero-art" aria-hidden="true"></div>
  <div id="vignette" aria-hidden="true"></div>
  <div id="scroll-progress" aria-hidden="true"></div>

  <header class="masthead">
    <span class="mark">MIB<b>▮</b></span>
    <span class="brand">Market Intelligence Brief · Terminal</span>
    <nav class="menu" aria-label="Site"></nav>
    <span class="stamp"></span>
    <button class="menu-toggle" aria-label="Menu" aria-expanded="false">
      <i></i><i></i>
    </button>
  </header>
  <div class="menu-overlay" aria-hidden="true"><nav aria-label="Site"></nav></div>

  <nav id="rail" aria-label="Sections"></nav>

  <main></main>

  <div class="tier-switch" aria-label="Prototype view switch">
    <a data-tier="member" href="?">MEMBER</a>
    <a data-tier="public" href="?tier=public">PUBLIC</a>
  </div>

  <!-- daily real-photo backdrops (concept/fetch_scenes.py); optional -->
  <script src="data/scenes.js" onerror="void 0"></script>
  <script src="vendor/three.min.js"></script>
  <script src="world3d.js"></script>
  <script src="app.js"></script>
  <!-- EN/FR language switch — additive overlay, loads after the renderer -->
  <script src="i18n.js" onerror="void 0"></script>
</body>
</html>
