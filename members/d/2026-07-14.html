const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function dec(key) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(key),
    "PBKDF2", false, ["deriveKey"]);
  const k = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(P.salt), iterations:P.iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(P.nonce)}, k, b64(P.ct));
  return new TextDecoder().decode(pt);
}

function load(src) {
  return new Promise(res => {
    const s = document.createElement("script");
    s.src = src; s.onload = () => res(true); s.onerror = () => res(false);
    document.body.appendChild(s);
  });
}
async function reveal(key) {
  const pt = await dec(key);
  window.MIB_BRIEF = JSON.parse(pt);
  window.MIB_PROD = 1;
  document.getElementById("lock").style.display = "none";
  document.getElementById("app").style.display = "block";
  const scenes = "";
  if (scenes) await load(scenes);       // frozen day photography (optional)
  await load("/vendor/three.min.js");   // 3D world (optional, graceful)
  await load("/world3d.js");

}
(async () => {
  // admin / direct access: #k=<passphrase> on ANY member page unlocks it
  // and remembers it — the same key members receive from the Whop gate
  const m = location.hash.match(/[#&]k=([^&]+)/);
  if (m) { const key = decodeURIComponent(m[1]);
    history.replaceState(null,"",location.pathname);
    try { localStorage.setItem("mib_pw", key); await reveal(key); return; }
    catch (x) { localStorage.removeItem("mib_pw"); } }
  const saved = localStorage.getItem("mib_pw");
  if (saved) { try { await reveal(saved); return; } catch (x) {
    localStorage.removeItem("mib_pw"); } }
  location.replace("../");              // no key -> member home (Whop login)
})();
