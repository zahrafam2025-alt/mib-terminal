const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryDecrypt(pw) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw),
    "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(P.salt), iterations:P.iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(P.nonce)}, key, b64(P.ct));
  return new TextDecoder().decode(pt);
}
async function unlock() {
  const pw = document.getElementById("pw").value.trim();
  if (!pw) return;
  document.getElementById("err").textContent = "checking…";
  try {
    const htmlOut = await tryDecrypt(pw);
    localStorage.setItem("mib_pw", pw);
    document.getElementById("lock").style.display = "none";
    document.getElementById("content").innerHTML = htmlOut;
  } catch (e) {
    document.getElementById("err").textContent = "Wrong password — check your welcome message.";
  }
}
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });
function showPwBox() {
  document.getElementById("pwbox").style.display = "block";
  const t = document.getElementById("pwtoggle");
  if (t) t.style.display = "none";
  return false;
}
(async () => {
  // key handed back by the Whop login gate lands in the URL fragment
  const m = location.hash.match(/[#&]k=([^&]+)/);
  const e = location.hash.match(/[#&]err=([^&]+)/);
  if (m) {
    const key = decodeURIComponent(m[1]);
    history.replaceState(null, "", location.pathname);
    try {
      const htmlOut = await tryDecrypt(key);
      localStorage.setItem("mib_pw", key);
      document.getElementById("lock").style.display = "none";
      document.getElementById("content").innerHTML = htmlOut;
      return;
    } catch (err) { /* fall through to saved/manual */ }
  } else if (e) {
    history.replaceState(null, "", location.pathname);
    document.getElementById("err").textContent =
      e[1] === "nomember"
        ? "No active membership found on that Whop account."
        : "Login didn't complete — please try again.";
  }
  const saved = localStorage.getItem("mib_pw");
  if (saved) {
    try {
      const htmlOut = await tryDecrypt(saved);
      document.getElementById("lock").style.display = "none";
      document.getElementById("content").innerHTML = htmlOut;
    } catch (err) { localStorage.removeItem("mib_pw"); }
  }
})();
</script>
