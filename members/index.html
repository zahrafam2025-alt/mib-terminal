<style>
:root { --bg-deep:#060d1a; --panel:rgba(14,28,51,.72);
  --panel-line:rgba(88,116,152,.22); --ink:#f4f7fa; --muted:#96a8be;
  --faint:#5b7292; --gold:#e9b949;
  --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
  --sans:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
#lock { position:relative; z-index:60; max-width:520px; margin:14vh auto 0;
  text-align:center; background:var(--panel); border:1px solid var(--panel-line);
  backdrop-filter:blur(10px); border-radius:16px; padding:44px 30px;
  box-shadow:0 24px 70px rgba(0,0,0,.55); font-family:var(--sans);
  color:var(--ink); }
#lock .mark { font:800 26px/1 var(--sans); letter-spacing:1px; }
#lock .mark b { color:var(--gold); }
#lock .badge { display:inline-block; margin:14px 0 4px;
  font:700 10px/1 var(--mono); letter-spacing:2px; color:var(--gold);
  border:1px solid #bf9534; border-radius:3px; padding:4px 9px; }
#lock h1 { margin:16px 0 8px; font:400 26px/1.3 var(--serif); }
#lock p { color:var(--muted); margin-bottom:20px; font-size:15px; }
#lock button { background:var(--gold); color:var(--bg-deep); font:700 15px/1
  var(--sans); border:0; border-radius:999px; padding:15px 30px; cursor:pointer; }
#lock a { color:var(--gold); }
#lock #err { color:#e85a5e; margin-top:12px; min-height:20px; font-size:14px; }
#lock .aux { margin-top:18px; font-size:13px; color:var(--faint); }

* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg-deep); color:var(--ink);
  font:17px/1.7 var(--sans); padding:0 18px 80px; }
.bar { max-width:760px; margin:0 auto; display:flex; align-items:center;
  gap:12px; padding:18px 2px; }
.bar .mark { font:800 22px/1 var(--sans); letter-spacing:1px; }
.bar .mark b { color:var(--gold); }
.bar .badge { font:700 10px/1 var(--mono); letter-spacing:2px;
  color:var(--gold); border:1px solid #bf9534; border-radius:3px;
  padding:4px 9px; }
#content { display:none; max-width:760px; margin:0 auto; }
.home h2 { display:flex; align-items:center; gap:14px; color:var(--gold);
  font:700 12px/1.4 var(--mono); letter-spacing:4px; text-transform:uppercase;
  margin:40px 0 16px; }
.home h2::after { content:""; height:1px; flex:0 0 64px;
  background:linear-gradient(90deg,#bf9534,transparent); }
.home .today { display:block; color:var(--ink); text-decoration:none;
  font:400 clamp(22px,3.4vw,30px)/1.35 var(--serif);
  padding:26px 28px; border:1px solid var(--panel-line); border-radius:14px;
  background:var(--panel); backdrop-filter:blur(8px); }
.home .today:hover { border-color:var(--gold); }
.home .arch a { display:flex; justify-content:space-between; gap:10px;
  color:var(--ink); text-decoration:none; padding:14px 18px;
  border:1px solid var(--panel-line); border-radius:12px; margin:10px 0;
  background:var(--panel); font:14px/1 var(--mono); }
.home .arch a:hover { border-color:var(--gold); }
.home .arch a .d { color:var(--gold); }
.home .none { color:var(--muted); }
.home .links { margin-top:34px; color:var(--faint);
  font:500 13px/2 var(--mono); }
.home .links a { color:var(--faint); }
</style>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function dec(key) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(key),
    "PBKDF2", false, ["deriveKey"]);
  const k = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(P.salt), iterations:P.iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(P.nonce)}, k, b64(P.ct));
  return new TextDecoder().decode(pt);
}

async function reveal(key) {
  const h = await dec(key);
  const lock = document.getElementById("lock");
  if (lock) lock.style.display = "none";
  const c = document.getElementById("content");
  c.innerHTML = h; c.style.display = "block";
}
(async () => {
  const m = location.hash.match(/[#&]k=([^&]+)/);
  const e = location.hash.match(/[#&]err=([^&]+)/);
  if (m) { const key = decodeURIComponent(m[1]);
    history.replaceState(null,"",location.pathname);
    try { localStorage.setItem("mib_pw", key); await reveal(key); return; }
    catch(x){ localStorage.removeItem("mib_pw"); }
  } else if (e) { history.replaceState(null,"",location.pathname);
    const el = document.getElementById("err");
    if (el) el.textContent = e[1]==="nomember"
      ? "No active membership found on that Whop account."
      : "Login didn't complete — please try again."; }
  const saved = localStorage.getItem("mib_pw");
  if (saved) { try { await reveal(saved); } catch(x){ localStorage.removeItem("mib_pw"); } }
})();
